<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Mines Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }

        p {
            text-align: center;
            margin-bottom: 25px;
            color: #cbd5e1;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #334155;
            color: white;
            font-size: 16px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .result {
            margin-top: 25px;
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .tiles {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
        }

        .safe {
            background: #22c55e;
        }

        .error {
            margin-top: 20px;
            padding: 12px;
            background: #dc2626;
            border-radius: 10px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bot Mines Predictor</h1>

    <p>
        Génération automatique des cases supposées sûres.
    </p>

    <div class="controls">
        <input
            type="number"
            id="count"
            placeholder="Nombre de cases"
            min="1"
            max="10"
            value="3"
        >

        <button onclick="getPrediction()">
            Générer une prédiction
        </button>
    </div>

    <div class="loading" id="loading">
        Chargement...
    </div>

    <div class="error" id="error"></div>

    <div class="result" id="result">
        <h2>Cases prédites</h2>

        <div class="tiles" id="tiles"></div>
    </div>
</div>

<script>
const API_URL = '/api'

const loadingEl = document.getElementById('loading')
const resultEl = document.getElementById('result')
const errorEl = document.getElementById('error')
const tilesEl = document.getElementById('tiles')

async function getPrediction() {
    try {
        loadingEl.style.display = 'block'
        resultEl.style.display = 'none'
        errorEl.style.display = 'none'

        const count = parseInt(
            document.getElementById('count').value
        )

        if (count < 1 || count > 10) {
            throw new Error('Le nombre doit être entre 1 et 10')
        }

        const response = await fetch(`${API_URL}/predict`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                count
            })
        })

        if (!response.ok) {
            throw new Error(`Erreur serveur ${response.status}`)
        }

        const data = await response.json()

        if (!data.success) {
            throw new Error(data.error || 'Erreur inconnue')
        }

        displayPrediction(data.prediction)

    } catch (e) {
        console.error(e)

        errorEl.style.display = 'block'
        errorEl.innerText = e.message

    } finally {
        loadingEl.style.display = 'none'
    }
}

function displayPrediction(predictions) {
    resultEl.style.display = 'block'

    tilesEl.innerHTML = ''

    for (let i = 1; i <= 25; i++) {
        const tile = document.createElement('div')

        tile.classList.add('tile')

        if (predictions.includes(i)) {
            tile.classList.add('safe')
        }

        tile.innerText = i

        tilesEl.appendChild(tile)
    }
}
</script>

</body>
</html>
