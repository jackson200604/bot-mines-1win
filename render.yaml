services:
  - type: web
    name: bot-mines-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: MONGO_URI
        sync: false   # Set manually in the Render dashboard — never commit this value
      - key: API_KEY
        sync: false   # Set manually in the Render dashboard — never commit this value
